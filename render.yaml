services:
  - type: web
    name: intelligent-research-assistant
    runtime: node
    region: oregon
    plan: free

    buildCommand: npm install --include=dev && npm run build

    startCommand: npm start

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: OPENROUTER_API_KEY
        sync: false

      - key: AI_MODEL
        value: meta-llama/llama-3.1-70b-instruct:free