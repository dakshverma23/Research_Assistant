services:
  - type: web
    name: intelligent-research-assistant
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build:all
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL
        value: meta-llama/llama-3.1-70b-instruct:free
      - key: PORT
        value: 10000